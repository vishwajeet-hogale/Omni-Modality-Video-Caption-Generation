defaults:
  - _self_

text_encoder_cfg:
  encoder: bert-base-uncased
  lora: true
  input_dim: 768 # BERT's hidden size
  output_dim: 768
  freeze: false

vision_encoder_cfg:
  encoder: swin_base_patch4_window7_224
  lora: false
  input_dim: 768 # ViT's patch embedding size
  output_dim: 1000
  freeze: false
audio_encoder_cfg:
  encoder: transformer_cls
  lora: false
  input_dim: 768 # Whisper's hidden size
  n_mfcc: 13
  freeze: false
fusion_cfg:
  fusion_type: concat
  input_dim: 768 # Optional: only used if projecting embeddings after concat
  output_dim: 768

decoder_cfg:
  decoder: facebook/bart-base
  lora: true
  input_dim: 1536 # Match fusion output_dim
  hidden_dim: 768
  output_dim: 768
  freeze: false

trainer:
  precision: 32
  accelerator: cuda
  devices: 1
  batch_size: 4
  lr: 2e-4  # Much lower for stable text feedback training
  device: cuda
  epochs: 10
  output_dir: /home/hov1syv/Desktop/Personal/research/video-commentary-ai/checkpoints
  max_seq_length: 128
  mlm_probability: 0.15
  save_steps: 500
  logging_steps: 100
  log_every_n_steps: 4
  exp_name: SwinBartAudio
  # Enhanced training settings for text feedback
  weight_decay: 0
  warmup_steps: 10000
  lr_scheduler: constant
  gradient_clip_val: 1.0
  min_lr: 5e-6

# Temporal attention configuration
use_temporal_attention: true # Set to true to enable temporal attention
use_text_feedback: true      # Set to true to enable text feedback for narrative continuity
temporal_attention_heads: 8
temporal_attention_dropout: 0.1
temporal_memory_length: 10

data:
  captions_dir: /home/hov1syv/Desktop/Personal/research/video-commentary-ai/captions_csv
  frames_dir: /home/hov1syv/Desktop/Personal/research/video-commentary-ai/frames
  audio_dir: /home/hov1syv/Desktop/Personal/research/video-commentary-ai/mfccs
  batch_size: 4
  num_workers: 0
  pin_memory: false
  use_csv: True
  # Video split configuration to prevent temporal leakage
  train_ratio: 1 # 70% of videos for training
  val_ratio: 1 # 15% of videos for validation
  test_ratio: 1 # 15% of videos for testing
  random_seed: 42 # For reproducible splits

inference:
  batch_size: 4
  num_workers: 0
  pin_memory: false
  max_length: 60
  min_length: 5
  top_k: 5
  top_p: 0.95
  temperature: 0.6
  image_size: 224
  num_beams: 4
  image_path: /home/hov1syv/Desktop/Personal/research/video-commentary-ai/frames/How To Insert A Nasogastric Tube » NG Tube » Nursing Skills_clip_40.0s_to_183.0s/frame_0001.jpg
  model_path: /home/hov1syv/Desktop/Personal/research/video-commentary-ai/checkpoints/best_model.pth
  video_image_dir: /home/hov1syv/Desktop/Personal/research/video-commentary-ai/frames/How To Insert A Nasogastric Tube » NG Tube » Nursing Skills_clip_40.0s_to_183.0s
  checkpoint_dir: /home/hov1syv/Desktop/Personal/research/video-commentary-ai/checkpoints
  inf_save_dir: /home/hov1syv/Desktop/Personal/research/video-commentary-ai/video_inference_transformer_cls/How To Insert A Nasogastric Tube » NG Tube » Nursing Skills_clip_40.0s_to_183.0s
